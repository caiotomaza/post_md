name: ${COMPOSE_PROJECT_NAME:-post_md}

x-php-service: &php-service
  build:
    context: .
    dockerfile: docker/php/Dockerfile
    target: development
    args:
      PHP_VERSION: ${PHP_VERSION:-8.4.22}
      COMPOSER_VERSION: ${COMPOSER_VERSION:-2.8}
      APP_UID: ${APP_UID:-1000}
      APP_GID: ${APP_GID:-1000}
  image: post_md/php:development
  working_dir: /var/www/html
  init: true
  restart: unless-stopped
  volumes:
    - ./src:/var/www/html
    - composer_cache:/tmp/composer-cache
  environment:
    APP_ENV: local
    COMPOSER_CACHE_DIR: /tmp/composer-cache
    DB_CONNECTION: pgsql
    DB_HOST: db
    DB_PORT: 5432
    DB_DATABASE: ${POSTGRES_DB:-post_md}
    DB_USERNAME: ${POSTGRES_USER:-post_md}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    REDIS_CLIENT: phpredis
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - backend
    - edge

services:
  app:
    <<: *php-service
    command: ["php-fpm"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/php-fpm-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    <<: *php-service
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --sleep=1
      - --tries=3
      - --timeout=120
      - --max-time=3600
    stop_grace_period: 130s

  scheduler:
    <<: *php-service
    command: ["php", "artisan", "schedule:work"]

  web:
    image: ${NGINX_IMAGE:-nginx:1.30.2-alpine3.23}
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - edge
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 5

  node:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    working_dir: /var/www/html
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    init: true
    restart: unless-stopped
    command: ["sh", "-lc", "if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm run dev -- --host 0.0.0.0"]
    ports:
      - "127.0.0.1:${VITE_PORT:-5173}:5173"
    volumes:
      - ./src:/var/www/html
      - node_modules:/var/www/html/node_modules
      - npm_cache:/home/node/.npm
    networks:
      - edge

  db:
    image: ${POSTGRES_IMAGE:-postgres:18.4-alpine}
    restart: unless-stopped
    init: true
    shm_size: 256mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-post_md}
      POSTGRES_USER: ${POSTGRES_USER:-post_md}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-redis:8.6.4-alpine3.23}
    restart: unless-stopped
    init: true
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --requirepass
      - ${REDIS_PASSWORD:-change_me_redis}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  composer_cache:
  node_modules:
  npm_cache:
